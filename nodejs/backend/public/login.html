<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LexiThera</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Background */
        .background-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.95) 0%, rgba(20, 20, 40, 0.9) 100%);
        }

        .login-container {
            max-width: 550px;
            width: 100%;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #00D9FF;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: #8b5cf6;
            transform: translateX(-3px);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #8b5cf6;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00D9FF 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 16px;
        }

        .role-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .role-card {
            background: rgba(15, 15, 30, 0.8);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .role-card:hover {
            transform: translateY(-10px);
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.3);
        }

        .role-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            display: block;
        }

        .role-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .role-title {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .role-desc {
            font-size: 13px;
            color: #9ca3af;
        }

        .or-divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .or-divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .or-divider span {
            background: #000;
            padding: 0 15px;
            position: relative;
            z-index: 1;
            color: #9ca3af;
            font-size: 14px;
        }

        .register-link {
            text-align: center;
            background: rgba(15, 15, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            color: #9ca3af;
            font-size: 14px;
        }

        .register-link a {
            color: #00D9FF;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #8b5cf6;
        }

        @media (max-width: 600px) {
            .role-cards {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 26px;
            }

            .role-icon {
                font-size: 40px;
            }

            .role-title {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <!-- Background -->
    <div class="background-wrapper">
        <img src="../background/background.jpg" alt="Background" class="background-image">
        <div class="background-overlay"></div>
    </div>

    <div class="login-container">
        <a href="index.html" class="back-btn">← Back to Home</a>

        <div class="header">
            <img src="LexiThera.png" alt="LexiThera Logo" class="logo">
            <h1>Welcome Back</h1>
            <p class="subtitle">Select your role to continue</p>
        </div>

        <div class="role-cards">
            <a href="patient-login.html" class="role-card">
                <div class="role-icon">
                    <img src="features/Patient.png" alt="Patient Icon">
                </div>
                <div class="role-title">Patient</div>
                <div class="role-desc">Access your therapy sessions</div>
            </a>

            <a href="consultant-login.html" class="role-card">
                <div class="role-icon">
                    <img src="features/Consultant.png" alt="Consultant Icon">
                </div>
                <div class="role-title">Consultant</div>
                <div class="role-desc">Manage your patients</div>
            </a>

            <a href="admin-login.html" class="role-card">
                <div class="role-icon">
                    <img src="features/Admin.png" alt="Admin Icon">
                </div>
                <div class="role-title">Admin</div>
                <div class="role-desc">System management</div>
            </a>
        </div>

        <div class="or-divider">
            <span>OR</span>
        </div>

        <div class="register-link">
            Don't have an account? <a href="patient-register.html">Register as Patient</a>
        </div>
    </div>
</body>

</html>
