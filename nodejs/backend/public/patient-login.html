<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login - LexiThera</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .background-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.95) 0%, rgba(20, 20, 40, 0.9) 100%);
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: rgba(15, 15, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #00D9FF;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: #8b5cf6;
            transform: translateX(-3px);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #8b5cf6;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00D9FF 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #d1d5db;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            color: #9ca3af;
            font-size: 14px;
        }

        .register-link a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #a78bfa;
        }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .success-message {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 30px 25px;
            }

            h1 {
                font-size: 24px;
            }
        }

        /* OTP Screen Styles */
        #otpScreen {
            display: none;
        }

        .otp-inputs {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 30px 0;
        }

        .otp-field {
            width: 55px;
            height: 55px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            background: rgba(0, 0, 0, 0.5);
            color: #8b5cf6;
            transition: all 0.3s ease;
        }

        .otp-field:focus {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        .timer-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 100px;
            height: 100px;
            overflow: visible;
        }

        .timer-circle-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 6;
        }

        .timer-circle-progress {
            fill: none;
            stroke: #8b5cf6;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.8));
        }

        #timerText {
            position: absolute;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            animation: pulseText 1s infinite alternate;
        }

        @keyframes pulseText {
            from {
                transform: scale(1);
                opacity: 0.8;
            }

            to {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        .resend-btn {
            background: transparent;
            border: none;
            color: #8b5cf6;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            opacity: 0.5;
            pointer-events: none;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: block;
            width: 100%;
            text-align: center;
        }

        .resend-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .resend-btn.active:hover {
            color: #a78bfa;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <!-- Background -->
    <div class="background-wrapper">
        <img src="../background/background.jpg" alt="Background" class="background-image">
        <div class="background-overlay"></div>
    </div>

    <div class="login-container">
        <a href="login.html" class="back-btn">← Back to Role Selection</a>

        <div class="header">
            <img src="LexiThera.png" alt="LexiThera Logo" class="logo">
            <h1>Patient Login</h1>
            <p class="subtitle">Welcome back! Enter your credentials</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage">✓ Login successful! Redirecting...</div>

        <!-- Login Screen -->
        <div id="loginScreen">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>

                <button type="submit" class="submit-btn" id="loginBtn">Login</button>
            </form>

            <div class="register-link">
                Don't have an account? <a href="patient-register.html">Register here</a>
            </div>
        </div>

        <!-- OTP Screen -->
        <div id="otpScreen">
            <div class="timer-container">
                <svg class="timer-svg" viewBox="0 0 100 100">
                    <circle class="timer-circle-bg" cx="50" cy="50" r="45"></circle>
                    <circle class="timer-circle-progress" id="progressCircle" cx="50" cy="50" r="45"></circle>
                </svg>
                <div id="timerText">60</div>
            </div>

            <div class="header" style="margin-bottom: 20px;">
                <h2 style="font-size: 24px;">Security Verification</h2>
                <p class="subtitle">Please enter the 6-digit code sent to <br><span id="displayEmail"
                        style="color: #8b5cf6;"></span></p>
            </div>

            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-field" id="otp-1">
                <input type="text" maxlength="1" class="otp-field" id="otp-2">
                <input type="text" maxlength="1" class="otp-field" id="otp-3">
                <input type="text" maxlength="1" class="otp-field" id="otp-4">
                <input type="text" maxlength="1" class="otp-field" id="otp-5">
                <input type="text" maxlength="1" class="otp-field" id="otp-6">
            </div>

            <button class="submit-btn" id="verifyBtn">Verify OTP</button>
            <button class="resend-btn" id="resendBtn">Resend Code</button>
            <a href="#" onclick="location.reload()"
                style="display: block; text-align: center; margin-top: 20px; color: #9ca3af; text-decoration: none; font-size: 13px;">Change
                email / Back to login</a>
        </div>
    </div>

    <script>
        const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && window.location.port !== '3001'
            ? 'http://localhost:3001'
            : window.location.origin === 'null' || window.location.origin.includes('file://')
                ? 'http://localhost:3001'
                : window.location.origin;

        const loginForm = document.getElementById('loginForm');
        const loginScreen = document.getElementById('loginScreen');
        const otpScreen = document.getElementById('otpScreen');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const displayEmail = document.getElementById('displayEmail');
        const otpFields = document.querySelectorAll('.otp-field');
        const timerText = document.getElementById('timerText');
        const progressCircle = document.getElementById('progressCircle');
        const resendBtn = document.getElementById('resendBtn');
        const verifyBtn = document.getElementById('verifyBtn');

        let userEmail = '';
        let timerInterval;
        const FULL_DASH_ARRAY = 283;

        // OTP Field Navigation
        otpFields.forEach((field, index) => {
            field.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < otpFields.length - 1) {
                    otpFields[index + 1].focus();
                }
            });

            field.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && field.value === '' && index > 0) {
                    otpFields[index - 1].focus();
                }
            });
        });

        // Login Handler
        loginForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            userEmail = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            errorMessage.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Authenticating...';

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, password, role: 'patient' })
                });

                const data = await response.json();

                if (data.success && data.requireOtp) {
                    // Transition to OTP Screen
                    loginScreen.style.display = 'none';
                    otpScreen.style.display = 'block';
                    displayEmail.textContent = userEmail;
                    startTimer();
                } else if (data.success) {
                    // Should not happen for patients now, but handles legacy if any
                    handleLoginSuccess(data);
                } else {
                    showError(data.error || 'Login failed');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                showError('Connection error. Please check your backend.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        // Verify OTP Handler
        verifyBtn.addEventListener('click', async () => {
            const otp = Array.from(otpFields).map(f => f.value).join('');
            if (otp.length !== 6) {
                showError('Please enter the full 6-digit code.');
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';
            errorMessage.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/api/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, otp })
                });

                const data = await response.json();

                if (data.success) {
                    handleLoginSuccess(data);
                } else {
                    showError(data.error || 'Invalid OTP');
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = 'Verify OTP';
                }
            } catch (error) {
                showError('Verification error.');
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'Verify OTP';
            }
        });

        // Resend OTP Handler
        resendBtn.addEventListener('click', async () => {
            resendBtn.classList.remove('active');
            try {
                const response = await fetch(`${API_URL}/api/auth/resend-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });

                const data = await response.json();
                if (data.success) {
                    startTimer();
                    showSuccess('OTP resent successfully!');
                    setTimeout(() => successMessage.style.display = 'none', 3000);
                } else {
                    showError('Failed to resend OTP.');
                    resendBtn.classList.add('active');
                }
            } catch (error) {
                showError('Resend error.');
                resendBtn.classList.add('active');
            }
        });

        function handleLoginSuccess(data) {
            localStorage.setItem('patient_token', data.token);
            localStorage.setItem('patient_user', JSON.stringify(data.user));
            successMessage.style.display = 'block';
            setTimeout(() => {
                window.location.href = 'patient-dashboard.html';
            }, 1000);
        }

        function startTimer() {
            let timeLeft = 60;
            resendBtn.classList.remove('active');
            clearInterval(timerInterval);

            updateCircle(0, timeLeft);
            timerText.textContent = timeLeft;

            timerInterval = setInterval(() => {
                timeLeft--;
                timerText.textContent = timeLeft;

                const percent = (60 - timeLeft) / 60;
                updateCircle(percent, timeLeft);

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.classList.add('active');
                }
            }, 1000);
        }

        function updateCircle(percent, timeLeft) {
            const offset = FULL_DASH_ARRAY * percent;
            progressCircle.style.strokeDashoffset = offset;

            // Color changing logic
            if (timeLeft > 30) {
                // Initial: Purple
                progressCircle.style.stroke = "#8b5cf6";
                progressCircle.style.filter = "drop-shadow(0 0 8px rgba(139, 92, 246, 0.8))";
            } else if (timeLeft > 10) {
                // Warning: Yellow/Orange
                progressCircle.style.stroke = "#f59e0b";
                progressCircle.style.filter = "drop-shadow(0 0 8px rgba(245, 158, 11, 0.8))";
            } else {
                // Critical: Red
                progressCircle.style.stroke = "#ef4444";
                progressCircle.style.filter = "drop-shadow(0 0 8px rgba(239, 68, 68, 0.8))";
            }
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
        }

        function showSuccess(msg) {
            successMessage.textContent = '✓ ' + msg;
            successMessage.style.display = 'block';
        }
    </script>
</body>

</html>
